<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating Plan Lookup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #4a4a8a;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        form {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #667eea;
        }
        button {
            padding: 12px 22px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #5563d8;
        }
        .result-card {
            margin-top: 28px;
            background: #f4f6ff;
            border-radius: 10px;
            padding: 24px;
            border-left: 5px solid #667eea;
        }
        .result-card h2 {
            color: #4a4a8a;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .result-card table {
            width: 100%;
            border-collapse: collapse;
        }
        .result-card td {
            padding: 8px 4px;
            font-size: 0.95rem;
            color: #333;
        }
        .result-card td:first-child {
            font-weight: 600;
            color: #555;
            width: 45%;
        }
        .error {
            margin-top: 24px;
            background: #fff0f0;
            border-left: 5px solid #e74c3c;
            border-radius: 8px;
            padding: 16px 20px;
            color: #c0392b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Exam Seating Lookup</h1>
        <p class="subtitle">Enter your register number to find your seat</p>
        <form method="POST">
            <input type="text" name="reg_no" placeholder="Register Number" required
                   value="{{ request.form.get('reg_no', '') }}">
            <button type="submit">Search</button>
        </form>

        {% if result %}
        <div class="result-card">
            <h2>✅ Seating Details</h2>
            <table>
                {% for key, value in result.items() %}
                <tr>
                    <td>{{ key }}</td>
                    <td>{{ value }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
        {% elif error %}
        <div class="error">⚠️ {{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
